{% extends "aquarium/base.html" %} {% block content %}

<div class="container mt-4">
    <h2>➕ Ajouter Bassin</h2>

    <form method="POST" class="mt-3">
        {% csrf_token %}

        <input type="text" name="nom" placeholder="Nom du bassin" class="form-control mb-2" required>

        <input type="number" name="volume" placeholder="Volume (litres)" class="form-control mb-2" required>

        <select name="type_eau" class="form-control mb-2" required>
            <option value="">-- Type d'eau --</option>
            <option value="douce">Douce</option>
            <option value="saumatre">Saumâtre</option>
            <option value="salee">Salée</option>
        </select>

        <input type="number" step="0.1" name="temperature" placeholder="Température actuelle" class="form-control mb-3" required>

        <button class="btn btn-primary">Ajouter</button>
    </form>
</div>

{% endblock %}
