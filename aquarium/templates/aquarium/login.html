{% block content %}

<video class="vd" autoplay muted loop>
    <source src="/media/14824149_1920_1080_60fps.mp4" type="video/mp4">
</video>

<div class="content">
    <h2>Login</h2>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Nom d'utilisateur" required>
        <input type="password" name="password" placeholder="Mot de passe" required>
        <button class="btn">Se connecter</button>
    </form>

    {% if error %}
    <div class="alert alert-danger mt-2">
        {{ error }}
    </div>
    {% endif %}

    <p class="mt-3">
        Pas encore de compte ? <a href="/register/">S'inscrire ici</a>
    </p>
</div>

<style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        /* centre horizontalement */
        align-items: center;
        /* centre verticalement */
        font-family: Arial, sans-serif;
        color: #003366;
    }
    /* Vidéo en fond */
    
    .vd {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -1;
    }
    /* Box principale */
    
    .content {
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 400px;
        background: rgba(238, 235, 255, 0.9);
        /* transparence élégante */
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.3);
        align-items: center;
        text-align: center;
    }
    /* Champs input */
    
    input {
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: 12px;
        margin: 10px 0;
        width: 100%;
        outline: none;
        transition: 0.3s;
    }
    
    input:focus {
        border-color: #006699;
        box-shadow: 0 0 8px rgba(0, 102, 153, 0.5);
    }
    /* Bouton */
    
    .btn {
        background-color: #003366;
        border: none;
        color: white;
        padding: 12px;
        font-size: 16px;
        margin-top: 15px;
        cursor: pointer;
        border-radius: 8px;
        width: 100%;
        transition: 0.3s;
    }
    
    .btn:hover {
        background-color: #006699;
    }
    
    h2 {
        margin-bottom: 20px;
        font-weight: bold;
    }
    
    a {
        color: #006699;
        text-decoration: none;
    }
    
    a:hover {
        text-decoration: underline;
    }
</style>

{% endblock %}
