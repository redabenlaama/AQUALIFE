{% load static %}
<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqualife</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-left: 8%;
        }
        
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: url("/media/e70d7328d26b9bf4bd53233b5cc33588.jpg") no-repeat;
            background-size: cover;
            background-position: 75% center;
        }
        
        .bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient( to right, rgba(0, 5, 20, 0.85) 0%, rgba(0, 5, 20, 0.5) 40%, rgba(0, 5, 20, 0.0) 100%);
        }
        
        .bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient( to bottom, rgba(0, 5, 20, 0.6) 0%, transparent 30%, transparent 70%, rgba(0, 5, 20, 0.6) 100%);
            z-index: 1;
        }
        
        .card {
            position: relative;
            z-index: 2;
            text-align: left;
            padding: 55px 50px;
            background: rgba(0, 15, 40, 0.45);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 28px;
            box-shadow: 0 0 0 1px rgba(0, 212, 255, 0.05), 0 20px 80px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            max-width: 440px;
            width: 90%;
        }
        
        .card .logo {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .card h1 {
            font-size: 2.6rem;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }
        
        .card h1 span {
            color: #00d4ff;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.6);
        }
        
        .divider {
            width: 50px;
            height: 2px;
            background: linear-gradient(to right, #00d4ff, transparent);
            margin: 18px 0;
        }
        
        .card p {
            font-size: 0.95rem;
            opacity: 0.75;
            margin-bottom: 38px;
            line-height: 1.7;
            max-width: 320px;
        }
        
        .btn-group {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 13px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #001a2e;
            box-shadow: 0 4px 25px rgba(0, 212, 255, 0.35);
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #00eeff, #00b8e0);
            transform: translateY(-3px);
            box-shadow: 0 8px 35px rgba(0, 212, 255, 0.55);
        }
        
        .btn-outline {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1.5px solid rgba(255, 255, 255, 0.3);
        }
        
        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.6);
            transform: translateY(-3px);
        }
        /* Subtle glow */
        
        .glow {
            position: fixed;
            bottom: -100px;
            left: 10%;
            width: 500px;
            height: 300px;
            background: radial-gradient(ellipse, rgba(0, 212, 255, 0.07) 0%, transparent 70%);
            z-index: 1;
            animation: pulse 4s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.5;
            }
            50% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div class="bg"></div>
    <div class="glow"></div>

    <div class="card">

        <h1>Bienvenue sur<br><span>Aqualife</span></h1>
        <div class="divider"></div>
        <p>Plongez dans le monde aquatique. Explorez les espèces, gérez vos bassins et bien plus encore.</p>
        <div class="btn-group">
            <a href="{% url 'liste_especes' %}" class="btn btn-primary">🐠 Enter Ocean</a>
            <a href="{% url 'logout' %}" class="btn btn-outline">🚪 Logout</a>
        </div>
    </div>

</body>

</html>
